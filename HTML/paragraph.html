<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!-- Case 1 -->
    <p>Hello</p>
    <p>Hi</p>
    <!-- Case 2 -->
    <p>Hello</p><p>Hi !</p>
    <!-- Case 3 -->
    <p>Hello Hi !</p>
    <!-- Case 4 -->
     <!-- <br> Break tag display in new line -->
    <p>Hello <br>
                   H    i!
    </p>
    <!-- preformatted text -->
    <pre> Hello 
              H I ! 
    </pre>
</body>
</html>
